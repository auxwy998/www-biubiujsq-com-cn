<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>教程文章 - biubiu加速器</title>
<meta name="description" content="biubiu加速器使用教程、游戏加速攻略、版本更新资讯，从入门到精通一站式阅读">
<link rel="canonical" href="https://www.biubiujsq.com.cn/articles.html">
<meta name="robots" content="index, follow">
<link rel="icon" href="/favicon.png" type="image/png">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#1a0508;color:#f5f5f5;line-height:1.6}
a{text-decoration:none;color:inherit}
.container{max-width:1100px;margin:0 auto;padding:0 20px}
.navbar{position:fixed;top:0;left:0;right:0;background:rgba(26,5,8,.98);backdrop-filter:blur(10px);z-index:1000;padding:15px 0;border-bottom:1px solid rgba(220,38,38,.2)}
.navbar .container{display:flex;justify-content:space-between;align-items:center}
.logo{font-size:24px;font-weight:800;background:linear-gradient(135deg,#dc2626,#f97316);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.nav-links{display:flex;gap:32px;list-style:none}
.nav-links a{color:#a3a3a3;font-size:15px;transition:color .3s}
.nav-links a:hover{color:#dc2626}
.page-header{padding:120px 0 40px;text-align:center}
.page-header h1{font-size:2rem;font-weight:800;margin-bottom:8px}
.page-header p{color:#a3a3a3;font-size:15px}
.filter-bar{display:flex;gap:8px;justify-content:center;margin-bottom:32px;flex-wrap:wrap}
.filter-btn{background:rgba(255,255,255,.05);border:1px solid rgba(220,38,38,.15);color:#a3a3a3;padding:8px 20px;border-radius:20px;cursor:pointer;font-size:14px;transition:all .2s}
.filter-btn:hover,.filter-btn.active{background:rgba(220,38,38,.15);color:#dc2626;border-color:#dc2626}
.articles-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;max-width:1100px;margin:0 auto;padding-bottom:80px}
.article-card{background:rgba(255,255,255,.05);border:1px solid rgba(220,38,38,.15);border-radius:12px;padding:20px;text-decoration:none;transition:all .2s;cursor:pointer;display:block}
.article-card:hover{border-color:#dc2626;transform:translateY(-3px)}
.article-card .cat{display:inline-block;background:rgba(220,38,38,.15);color:#dc2626;padding:3px 10px;border-radius:6px;font-size:12px;margin-bottom:10px}
.article-card h3{font-size:15px;color:#f5f5f5;margin-bottom:8px;line-height:1.5}
.article-card p{font-size:13px;color:#a3a3a3;margin-bottom:8px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.article-card .date{font-size:12px;color:#737373}
.footer{padding:32px 0;border-top:1px solid rgba(220,38,38,.2);text-align:center;margin-top:40px}
.footer p{color:#a3a3a3;font-size:14px}
@media(max-width:1024px){.articles-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:768px){.nav-links{display:none}.articles-grid{grid-template-columns:1fr}.page-header h1{font-size:1.5rem}}
</style>
</head>
<body>
<nav class="navbar">
<div class="container">
<a href="/" class="logo">biubiu加速器</a>
<ul class="nav-links">
<li><a href="/">首页</a></li>
<li><a href="/articles.html" style="color:#dc2626">教程文章</a></li>
<li><a href="/download.html">下载</a></li>
</ul>
</div>
</nav>
<div class="page-header">
<div class="container">
<h1>教程文章</h1>
<p>从入门到精通，手把手教你用biubiu加速器</p>
</div>
</div>
<div class="container">
<div class="filter-bar">
<button class="filter-btn active" data-cat="all">全部</button>
<button class="filter-btn" data-cat="对比">对比</button>
<button class="filter-btn" data-cat="攻略">攻略</button>
<button class="filter-btn" data-cat="教程">教程</button>
<button class="filter-btn" data-cat="评测">评测</button>
<button class="filter-btn" data-cat="资讯">资讯</button>
</div>
<div class="articles-grid" id="articles-list"></div>
</div>
<footer class="footer">
<div class="container">
<p>© 2024 biubiu加速器官网 www.biubiujsq.com.cn 版权所有</p>
</div>
</footer>
<script>
fetch('/articles.json').then(r=>r.json()).then(data=>{
const list=document.getElementById('articles-list');
let currentCat='all';
function render(cat){
currentCat=cat;
list.innerHTML='';
const filtered=cat==='all'?data:data.filter(a=>a.category===cat);
filtered.forEach(a=>{
const card=document.createElement('a');card.href=a.url;card.className='article-card';card.dataset.category=a.category;
card.innerHTML=`<span class="cat">${a.category}</span><h3>${a.title}</h3><p>${a.description}</p><span class="date">${a.date}</span>`;
list.appendChild(card);
});
}
render('all');
document.querySelectorAll('.filter-btn').forEach(btn=>{
btn.addEventListener('click',()=>{
document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
btn.classList.add('active');
render(btn.dataset.cat);
});
});
}).catch(e=>console.error('Failed to load articles:',e));
</script>
</body>
</html>
